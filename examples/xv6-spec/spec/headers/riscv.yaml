id: header.riscv
kind: header
target: include/riscv.h
stage: boot
purpose: >
  RISC-V specific CSR access macros, inline assembly
  helpers, privilege mode definitions, and Sv39 page
  table entry flag constants. Every kernel module that
  interacts with hardware registers includes this header.

includes:
  - types.h
typedefs: []
structs: []
constants: []
macros:
  - name: PTE_V
    value: "(1L << 0)"
    comment: Valid bit
  - name: PTE_R
    value: "(1L << 1)"
    comment: Readable
  - name: PTE_W
    value: "(1L << 2)"
    comment: Writable
  - name: PTE_X
    value: "(1L << 3)"
    comment: Executable
  - name: PTE_U
    value: "(1L << 4)"
    comment: User accessible
  - name: PTE_G
    value: "(1L << 5)"
    comment: Global mapping
  - name: PTE_A
    value: "(1L << 6)"
    comment: Accessed
  - name: PTE_D
    value: "(1L << 7)"
    comment: Dirty
  - name: PTE_FLAGS
    value: "(PTE_V | PTE_R | PTE_W | PTE_X)"
    comment: PTE permission mask
  - name: PA2PTE
    value: "(pa) (((uint64)(pa) >> 12) << 10)"
    comment: Convert physical address to PTE PPN field
  - name: PTE2PA
    value: "(pte) (((pte) >> 10) << 12)"
    comment: Extract physical address from PTE
  - name: PXMASK
    value: "0x1FF"
    comment: 9-bit VPN index mask per level
  - name: PXSHIFT
    value: "(level) (PGSHIFT + (9 * (level)))"
    comment: VPN index shift for Sv39 levels (0,1,2)
  - name: PX
    value: "(level, va) ((((uint64)(va)) >> PXSHIFT(level)) & PXMASK)"
    comment: Extract VPN index at given Sv39 level
  - name: MAXVA
    value: "(1L << (9 + 9 + 9 + 12 - 1))"
    comment: Maximum user virtual address (Sv39 sign extension limit)
  - name: r_scause
    value: "() ({ uint64 x; asm volatile(\"csrr %0, scause\" : \"=r\"(x)); x; })"
    comment: Read supervisor cause register
  - name: w_stvec
    value: "(x) asm volatile(\"csrw stvec, %0\" : : \"r\"(x))"
    comment: Write supervisor trap vector
  - name: r_sstatus
    value: "() ({ uint64 x; asm volatile(\"csrr %0, sstatus\" : \"=r\"(x)); x; })"
    comment: Read supervisor status register
  - name: w_sstatus
    value: "(x) asm volatile(\"csrw sstatus, %0\" : : \"r\"(x))"
    comment: Write supervisor status register
  - name: r_sepc
    value: "() ({ uint64 x; asm volatile(\"csrr %0, sepc\" : \"=r\"(x)); x; })"
    comment: Read supervisor exception program counter
  - name: w_sepc
    value: "(x) asm volatile(\"csrw sepc, %0\" : : \"r\"(x))"
    comment: Write supervisor exception program counter
  - name: r_stval
    value: "() ({ uint64 x; asm volatile(\"csrr %0, stval\" : \"=r\"(x)); x; })"
    comment: Read supervisor trap value
  - name: r_satp
    value: "() ({ uint64 x; asm volatile(\"csrr %0, satp\" : \"=r\"(x)); x; })"
    comment: Read supervisor address translation and protection
  - name: w_satp
    value: "(x) asm volatile(\"csrw satp, %0\" : : \"r\"(x))"
    comment: Write supervisor address translation and protection
  - name: sfence_vma
    value: "() asm volatile(\"sfence.vma zero, zero\")"
    comment: Flush TLB
  - name: w_sie
    value: "(x) asm volatile(\"csrw sie, %0\" : : \"r\"(x))"
    comment: Write supervisor interrupt enable
  - name: r_sie
    value: "() ({ uint64 x; asm volatile(\"csrr %0, sie\" : \"=r\"(x)); x; })"
    comment: Read supervisor interrupt enable
  - name: r_tp
    value: "() ({ uint64 x; asm volatile(\"mv %0, tp\" : \"=r\"(x)); x; })"
    comment: Read thread pointer (hart id)
  - name: w_tp
    value: "(x) asm volatile(\"mv tp, %0\" : : \"r\"(x))"
    comment: Write thread pointer
  - name: SSTATUS_SIE
    value: "(1L << 1)"
    comment: Supervisor interrupt enable bit in sstatus
  - name: SSTATUS_SPP
    value: "(1L << 8)"
    comment: Supervisor previous privilege mode bit
  - name: SSTATUS_SPIE
    value: "(1L << 5)"
    comment: Supervisor previous interrupt enable
  - name: SIE_SEIE
    value: "(1L << 9)"
    comment: Supervisor external interrupt enable
  - name: SIE_STIE
    value: "(1L << 5)"
    comment: Supervisor timer interrupt enable
  - name: SIE_SSIE
    value: "(1L << 1)"
    comment: Supervisor software interrupt enable
  - name: SATP_SV39
    value: "(8L << 60)"
    comment: Sv39 paging mode for satp
  - name: MAKE_SATP
    value: "(pagetable) (SATP_SV39 | (((uint64)(pagetable)) >> 12))"
    comment: Construct satp value from pagetable pointer
  - name: intr_on
    value: "() w_sstatus(r_sstatus() | SSTATUS_SIE)"
    comment: Enable supervisor interrupts
  - name: intr_off
    value: "() w_sstatus(r_sstatus() & ~SSTATUS_SIE)"
    comment: Disable supervisor interrupts
  - name: intr_get
    value: "() ({ uint64 x = r_sstatus(); (x & SSTATUS_SIE) != 0; })"
    comment: Check if supervisor interrupts are enabled
function_declarations: []
