id: header.spinlock
kind: header
target: include/spinlock.h
stage: trap
purpose: >
  Spinlock data structure and API for mutual exclusion
  in the xv6 kernel. Spinlocks disable interrupts to
  prevent deadlocks with interrupt handlers on the
  same hart.

includes:
  - types.h
typedefs: []
structs:
  - name: spinlock
    fields:
      - name: locked
        type: uint
        comment: Is the lock held?
      - name: name
        type: "const char *"
        comment: For debugging
      - name: cpu
        type: "struct cpu *"
        comment: CPU holding the lock
constants: []
macros: []
function_declarations:
  - name: initlock
    signature: "void initlock(struct spinlock *lk, const char *name)"
    module: process
    description: Initialize a spinlock
  - name: acquire
    signature: "void acquire(struct spinlock *lk)"
    module: process
    description: Acquire the spinlock, spinning until available
  - name: release
    signature: "void release(struct spinlock *lk)"
    module: process
    description: Release the spinlock
  - name: holding
    signature: "int holding(struct spinlock *lk)"
    module: process
    description: Check if the current CPU holds the lock
  - name: push_off
    signature: "void push_off(void)"
    module: process
    description: Disable interrupts, saving previous state
  - name: pop_off
    signature: "void pop_off(void)"
    module: process
    description: Restore previous interrupt state
