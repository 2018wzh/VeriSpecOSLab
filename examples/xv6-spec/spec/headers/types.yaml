id: header.types
kind: header
target: include/types.h
stage: boot
purpose: >
  Base type definitions for the xv6 RISC-V kernel.
  Defines the fundamental integer types, page table
  entry type, and page table pointer type used
  throughout all kernel modules.

includes: []
typedefs:
  - name: uint64
    definition: typedef unsigned long long uint64
  - name: int64
    definition: typedef long long int64
  - name: uint32
    definition: typedef unsigned int uint32
  - name: int32
    definition: typedef int int32
  - name: uint16
    definition: typedef unsigned short uint16
  - name: int16
    definition: typedef short int16
  - name: uint8
    definition: typedef unsigned char uint8
  - name: int8
    definition: typedef signed char int8
  - name: uint
    definition: typedef unsigned int uint
  - name: usize
    definition: typedef uint64 usize
  - name: pte_t
    definition: typedef uint64 pte_t
    comment: Sv39 page table entry
  - name: pagetable_t
    definition: typedef uint64 *pagetable_t
    comment: Pointer to L2 page directory (root of 3-level page table)
  - name: spinlock_t
    definition: typedef struct spinlock spinlock_t
constants:
  - name: PGSIZE
    value: 4096
    comment: Page size in bytes
  - name: PGSHIFT
    value: 12
    comment: log2(PGSIZE)
structs: []
macros: []
function_declarations: []
