id: header.param
kind: header
target: include/param.h
stage: boot
purpose: >
  System-wide configuration parameters for the xv6 kernel:
  maximum number of processes, kernel stack size, file
  descriptor limit, and maximum syscall argument count.

includes:
  - types.h
typedefs: []
structs: []
constants:
  - name: NPROC
    value: "64"
    comment: Maximum number of processes
  - name: STACK_SIZE
    value: "4096"
    comment: Per-process kernel stack size (one page)
  - name: NOFILE
    value: "16"
    comment: Maximum open files per process
  - name: MAXARG
    value: "32"
    comment: Maximum exec arguments
macros: []
function_declarations: []
