id: header.memlayout
kind: header
target: include/memlayout.h
stage: boot
purpose: >
  Physical and virtual memory layout constants for the
  xv6 RISC-V kernel on the QEMU virt machine. Defines
  the base addresses for kernel code, devices, and the
  trampoline/trapframe mappings.

includes:
  - types.h
typedefs: []
structs: []
constants:
  - name: KERNBASE
    value: "0x80000000L"
    comment: Base of kernel virtual address space (also physical start)
  - name: PHYSTOP
    value: "0x88000000L"
    comment: Top of physical memory (128 MiB)
  - name: PLIC
    value: "0x0C000000L"
    comment: Platform-Level Interrupt Controller base
  - name: PLIC_SCLAIM
    value: "(PLIC + 0x201000)"
    comment: PLIC supervisor context claim/complete
  - name: UART0
    value: "0x10000000L"
    comment: UART0 base address (NS16550A compatible)
  - name: UART0_IRQ
    value: "10"
    comment: UART0 interrupt number
  - name: VIRTIO0
    value: "0x10001000L"
    comment: VIRTIO MMIO base
  - name: VIRTIO0_IRQ
    value: "1"
    comment: VIRTIO interrupt number
  - name: CLINT
    value: "0x02000000L"
    comment: Core Local Interruptor base
  - name: CLINT_MTIMECMP
    value: "(CLINT + 0x4000)"
    comment: Machine-mode timer compare register
  - name: CLINT_MTIME
    value: "(CLINT + 0xBFF8)"
    comment: Machine-mode timer register
  - name: TRAMPOLINE
    value: "(MAXVA - PGSIZE)"
    comment: Trampoline page (top of virtual address space)
  - name: TRAPFRAME
    value: "(TRAMPOLINE - PGSIZE)"
    comment: Per-process trapframe page
macros: []
function_declarations: []
