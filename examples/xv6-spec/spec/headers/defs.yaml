id: header.defs
kind: header
target: include/defs.h
stage: boot
purpose: >
  Forward declarations of all globally-visible functions
  exported by kernel modules. Serves as the single include
  that clients use to access any kernel API.

  Declarations are grouped by originating module.

includes:
  - types.h
  - param.h
  - riscv.h
  - memlayout.h
  - spinlock.h
  - proc.h
  - elf.h
typedefs: []
structs: []
constants: []
macros: []
function_declarations:
  # boot module
  - name: boot_banner
    signature: "const char *boot_banner(void)"
    module: boot
  - name: console_putchar
    signature: "void console_putchar(int c)"
    module: boot
  - name: console_write
    signature: "void console_write(const char *buf, int n)"
    module: boot
  - name: shutdown
    signature: "void shutdown(void)"
    module: boot
  - name: kernel_main
    signature: "void kernel_main(void)"
    module: boot

  # memory module
  - name: kinit
    signature: "void kinit(void)"
    module: memory
  - name: kalloc
    signature: "void *kalloc(void)"
    module: memory
  - name: kfree
    signature: "void kfree(void *pa)"
    module: memory
  - name: kvmmake
    signature: "pagetable_t kvmmake(void)"
    module: memory
  - name: kvmmap
    signature: "void kvmmap(pagetable_t pgtbl, uint64 va, uint64 pa, uint64 sz, int perm)"
    module: memory
  - name: walk
    signature: "pte_t *walk(pagetable_t pgtbl, uint64 va, int alloc)"
    module: memory
  - name: walkaddr
    signature: "uint64 walkaddr(pagetable_t pgtbl, uint64 va)"
    module: memory
  - name: uvmcreate
    signature: "pagetable_t uvmcreate(void)"
    module: memory
  - name: uvminit
    signature: "void uvminit(pagetable_t pgtbl, pagetable_t kpgtbl)"
    module: memory
  - name: uvmalloc
    signature: "uint64 uvmalloc(pagetable_t pgtbl, uint64 oldsz, uint64 newsz)"
    module: memory
  - name: uvmdealloc
    signature: "uint64 uvmdealloc(pagetable_t pgtbl, uint64 oldsz, uint64 newsz)"
    module: memory
  - name: uvmfree
    signature: "void uvmfree(pagetable_t pgtbl, uint64 sz)"
    module: memory
  - name: uvmunmap
    signature: "void uvmunmap(pagetable_t pgtbl, uint64 va, uint64 npages, int do_free)"
    module: memory
  - name: uvmcopy
    signature: "pagetable_t uvmcopy(pagetable_t old, uint64 sz)"
    module: memory
  - name: copyin
    signature: "int copyin(pagetable_t pgtbl, char *dst, uint64 srcva, uint64 len)"
    module: memory
  - name: copyout
    signature: "int copyout(pagetable_t pgtbl, uint64 dstva, char *src, uint64 len)"
    module: memory
  - name: copyinstr
    signature: "int copyinstr(pagetable_t pgtbl, char *dst, uint64 srcva, uint64 max)"
    module: memory

  # trap module
  - name: trap_init
    signature: "void trap_init(void)"
    module: trap
  - name: usertrap
    signature: "void usertrap(void)"
    module: trap
  - name: kerneltrap
    signature: "void kerneltrap(void)"
    module: trap
  - name: usertrapret
    signature: "void usertrapret(void)"
    module: trap
  - name: devintr
    signature: "int devintr(void)"
    module: trap

  # process module
  - name: proc_init
    signature: "void proc_init(void)"
    module: process
  - name: allocproc
    signature: "struct proc *allocproc(void)"
    module: process
  - name: freeproc
    signature: "void freeproc(struct proc *p)"
    module: process
  - name: scheduler
    signature: "void scheduler(void)"
    module: process
  - name: swtch
    signature: "void swtch(struct context *old, struct context *new)"
    module: process
  - name: yield
    signature: "void yield(void)"
    module: process
  - name: fork
    signature: "int fork(void)"
    module: process
  - name: exit
    signature: "void exit(int status)"
    module: process
  - name: wait
    signature: "int wait(uint64 addr)"
    module: process
  - name: sleep
    signature: "void sleep(void *chan, struct spinlock *lk)"
    module: process
  - name: wakeup
    signature: "void wakeup(void *chan)"
    module: process
  - name: growproc
    signature: "int growproc(int n)"
    module: process
  - name: userinit
    signature: "void userinit(void)"
    module: process

  # syscall module
  - name: syscall
    signature: "void syscall(void)"
    module: syscall
  - name: sys_write
    signature: "uint64 sys_write(void)"
    module: syscall
  - name: sys_exit
    signature: "uint64 sys_exit(void)"
    module: syscall
  - name: sys_fork
    signature: "uint64 sys_fork(void)"
    module: syscall
  - name: sys_wait
    signature: "uint64 sys_wait(void)"
    module: syscall
  - name: sys_sbrk
    signature: "uint64 sys_sbrk(void)"
    module: syscall
  - name: argint
    signature: "int argint(int n, int *ip)"
    module: syscall
  - name: argaddr
    signature: "int argaddr(int n, uint64 *ip)"
    module: syscall
  - name: fetchaddr
    signature: "int fetchaddr(uint64 addr, uint64 *ip)"
    module: syscall
  - name: fetchstr
    signature: "int fetchstr(uint64 addr, char *buf, int max)"
    module: syscall
