id: slice-01-boot
stage: boot
title: Early Boot and Banner
summary: >
  Minimal entry sequence: set up stack, zero BSS, initialize
  SBI console, print boot banner, and signal boot completion.

depends_on_slices: []
depends_on_adrs: []

mechanisms:
  - RISC-V S-mode entry from OpenSBI
  - stack allocation in BSS
  - SBI console putchar via ecall
  - boot banner display
  - shutdown via SBI SRST
affected_modules:
  - boot
new_operations:
  - boot_banner
  - console_putchar
  - console_write
  - shutdown
removed_or_replaced_mechanisms: []

invariants:
  - kernel entry runs on a single hart
  - BSS is zeroed before any global variable access
  - boot banner is printed before platform init
security_boundaries:
  - no user context exists yet; all code runs in S-mode
concurrency_highlights:
  - single-hart execution only
validation_binding:
  must_pass:
    - build_kernel
    - qemu_boot_smoke
    - verify_boot_banner
open_questions: []
