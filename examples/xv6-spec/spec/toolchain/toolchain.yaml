# xv6 RISC-V Toolchain Spec Index
# This is the entry point consumed by vos-runtime.
# Detailed specs are split into separate files per the
# spec/toolchain/ standard layout.

includes:
  - profile.yaml
  - build.yaml
  - link.yaml
  - image.yaml
  - run.yaml
  - debug.yaml

validation:
  must_pass:
    - kernel_compile
    - user_archive
    - link_kernel
    - generate_image
    - qemu_boot_smoke
    - verify_boot_banner
    - verify_page_allocator
    - verify_kernel_page_table
    - verify_trap_vector
    - verify_timer_interrupt
    - verify_fork_exit_wait
    - verify_syscall_dispatch
