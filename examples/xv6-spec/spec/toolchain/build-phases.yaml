# xv6 RISC-V 构建阶段规范 (已拆分)
#
# 本文件已被拆分为多个独立 spec：
#   - profile.yaml    (工具链和环境配置)
#   - build.yaml      (语义构建阶段)
#   - link.yaml       (链接规范)
#   - image.yaml      (镜像生成)
#   - run.yaml        (QEMU 运行配置)
#   - debug.yaml      (调试配置)
#
# 入口文件现已变为 toolchain.yaml。
# 本文件保留作为历史参考，不再作为规范入口。
#
# 原内容如下（仅供参考，不应被工具消费）:

toolchain:
  target_arch: riscv64
  target_triple: riscv64-unknown-elf
  c_compiler: gcc
  asm_compiler: gcc
  linker: ld
  archiver: ar

environment:
  required_tools:
    - gcc: ">=9.0"
    - ld: ">=2.32"
    - ar: ">=2.30"
    - riscv64-unknown-elf-objcopy: "latest"

build:
  phases:
    - name: kernel_compile
      semantic:
        type: compile
        compiler: gcc
        sources:
          - pattern: "kernel/**/*.c"
            exclude: ["kernel/test/**", "kernel/bench/**"]
        include_dirs:
          - include
          - kernel/include
        flags:
          warnings: [all, error]
          optimization: O2
          debug: true
          defines:
            - KERNEL
            - ARCH_RISCV64
            - CONFIG_BIGMEM=1
        standard: c11
        output_dir: build/
        output_pattern: "*.o"
        timeout_secs: 120

    - name: user_compile
      semantic:
        type: compile
        sources:
          - pattern: "user/**/*.c"
          - pattern: "user/**/*.s"
        include_dirs:
          - include
          - user/include
        flags:
          warnings: [all]
          optimization: O2
          debug: false
          defines:
            - USER
        standard: c11
        output_dir: build/user/
        output_pattern: "*.o"
        timeout_secs: 60

    - name: bootloader_compile
      semantic:
        type: compile
        compiler: gcc
        sources:
          - pattern: "bootloader/**/*.s"
        include_dirs:
          - include
        flags:
          warnings: []
          debug: false
        output_dir: build/
        timeout_secs: 30

    - name: user_archive
      semantic:
        type: archive
        input_artifacts:
          - build/user/shell.o
          - build/user/cat.o
          - build/user/echo.o
          - build/user/ls.o
          - build/user/mkdir.o
        output_file: build/user.a
        library_type: static
        dependencies: [user_compile]
        timeout_secs: 30

    - name: link_kernel
      semantic:
        type: link
        linker: ld
        input_artifacts:
          - build/bootloader.o
          - build/kernel.o
          - build/memory.o
          - build/process.o
          - build/trap.o
          - build/syscall.o
          - build/user.a
        output_file: kernel
        output_format: elf64
        linker_script: kernel/link.ld
        libraries:
          - name: c
            hint: "-lc"
        library_dirs:
          - /opt/riscv/lib
        flags:
          extra: "-nostdlib -N -Wl,--print-memory-usage"
        dependencies: [kernel_compile, user_archive, bootloader_compile]
        timeout_secs: 60

    - name: generate_image
      semantic:
        type: custom
        description: "使用 objcopy 从 ELF 生成二进制镜像"
        command: "riscv64-unknown-elf-objcopy -O binary kernel kernel.bin"
        expected_outputs: [kernel.bin]
        dependencies: [link_kernel]
        timeout_secs: 30

    - name: generate_asm
      semantic:
        type: custom
        description: "生成内核反汇编供调试"
        command: "riscv64-unknown-elf-objdump -D kernel > kernel.asm"
        expected_outputs: [kernel.asm]
        dependencies: [link_kernel]
        timeout_secs: 30
        parallel: true

image:
  output_kind: kernel-elf
  required_artifacts:
    - build/kernel.elf
    - build/kernel.bin

run:
  emulator: qemu-system-riscv64
  machine: virt
  cpu: rv64
  memory: 128M
  bios: default
  kernel: kernel
  append: boot-smoke
  extra_args:
    - -nographic
    - -no-reboot
    - -serial
    - mon:stdio
  success_signal: XV6_BOOT_OK
  timeout_secs: 30

validation:
  must_pass:
    - kernel_compile
    - user_archive
    - link_kernel
    - generate_image

troubleshooting:
  kernel_compile_failed: |
    检查:
    - 所有 .c 源文件是否存在于 kernel/ 目录
    - include/ 和 kernel/include/ 目录是否包含必需的头文件
    - 编译器是否支持 RISC-V 目标 (gcc -print-file-name=libc.a 应能输出路径)

  link_kernel_failed: |
    检查:
    - kernel/link.ld 链接脚本是否存在且语法正确
    - build/ 目录中的 .o 文件是否都已生成
    - riscv64-unknown-elf-ld 是否可用 (which riscv64-unknown-elf-ld)
    - kernel.bin 是否成功生成

  qemu_failed: |
    检查:
    - qemu-system-riscv64 是否已安装
    - kernel 文件是否可执行的 ELF 格式 (file kernel)
    - 运行时是否看到启动消息 "XV6_BOOT_OK"
