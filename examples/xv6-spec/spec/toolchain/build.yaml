# xv6 RISC-V semantic build specification
# Tool-agnostic; consumed by vos-runtime via generator selection.

build:
  allowed_output_path:
    - Makefile
    - CMakeLists.txt
    - xtask/src/tasks.rs
    - xtask/Cargo.toml
  sources:
    - kernel/**/*.c
  include_paths:
    - include
    - kernel/include
  cflags:
    - -fno-common
  asmflags: []
  ldflags:
    - -nostdlib
    - -N
  features: []
  forbidden_flags: []
  generated_artifacts:
    - build/kernel.elf
    - build/kernel.bin
    - build/kernel.asm
  phases:
    # Phase 1: compile kernel core code
    - name: kernel_compile
      semantic:
        type: compile
        compiler: gcc
        sources:
          - pattern: "kernel/**/*.c"
            exclude: ["kernel/test/**", "kernel/bench/**"]
        include_dirs:
          - include
          - kernel/include
        flags:
          warnings: [all, error]
          optimization: O2
          debug: true
          defines:
            - KERNEL
            - ARCH_RISCV64
            - CONFIG_BIGMEM=1
        standard: c11
        output_dir: build/
        output_pattern: "*.o"
        timeout_secs: 120

    # Phase 2: compile boot + kernel assembly
    - name: asm_compile
      semantic:
        type: compile
        compiler: gcc
        sources:
          - pattern: "kernel/entry.S"
          - pattern: "kernel/kernelvec.S"
          - pattern: "kernel/trampoline.S"
          - pattern: "kernel/swtch.S"
        include_dirs:
          - include
        flags:
          warnings: []
          debug: false
        output_dir: build/
        output_pattern: "*.o"
        timeout_secs: 60

    # Phase 3: link the kernel image
    - name: link_kernel
      semantic:
        type: link
        linker: ld
        input_artifacts:
          - build/kernel/entry.o
          - build/kernel/boot.o
          - build/kernel/memory.o
          - build/kernel/process.o
          - build/kernel/trap.o
          - build/kernel/syscall.o
          - build/kernel/kernelvec.o
          - build/kernel/trampoline.o
          - build/kernel/swtch.o
        output_file: build/kernel.elf
        output_format: elf64
        linker_script: kernel/link.ld
        libraries:
          - name: c
            hint: "-lc"
        library_dirs:
          - /opt/riscv/lib
        flags:
          extra: "-nostdlib -N -Wl,--print-memory-usage"
        dependencies: [kernel_compile, asm_compile]
        timeout_secs: 60

    # Phase 4: generate a binary image
    - name: generate_image
      semantic:
        type: custom
        description: "使用 objcopy 从 ELF 生成二进制镜像"
        command: "riscv64-unknown-elf-objcopy -O binary build/kernel.elf build/kernel.bin"
        expected_outputs: [build/kernel.bin]
        dependencies: [link_kernel]
        timeout_secs: 30

    # Phase 5: generate a disassembly artifact
    - name: generate_asm
      semantic:
        type: custom
        description: "生成内核反汇编供调试"
        command: "riscv64-unknown-elf-objdump -D build/kernel.elf > build/kernel.asm"
        expected_outputs: [build/kernel.asm]
        dependencies: [link_kernel]
        timeout_secs: 30
        parallel: true
