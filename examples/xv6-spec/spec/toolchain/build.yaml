# xv6 RISC-V semantic build specification
# Tool-agnostic; consumed by vos-runtime via generator selection.

build:
  sources:
    - kernel/**/*.c
    - user/**/*.c
  include_paths:
    - include
    - kernel/include
    - user/include
  cflags:
    - -fno-common
  asmflags: []
  ldflags:
    - -nostdlib
    - -N
  features: []
  forbidden_flags: []
  generated_artifacts:
    - build/user.a
    - build/kernel.elf
    - build/kernel.bin
    - build/kernel.asm
  phases:
    # Phase 1: compile kernel core code
    - name: kernel_compile
      semantic:
        type: compile
        compiler: gcc
        sources:
          - pattern: "kernel/**/*.c"
            exclude: ["kernel/test/**", "kernel/bench/**"]
        include_dirs:
          - include
          - kernel/include
        flags:
          warnings: [all, error]
          optimization: O2
          debug: true
          defines:
            - KERNEL
            - ARCH_RISCV64
            - CONFIG_BIGMEM=1
        standard: c11
        output_dir: build/
        output_pattern: "*.o"
        timeout_secs: 120

    # Phase 2: compile user programs
    - name: user_compile
      semantic:
        type: compile
        sources:
          - pattern: "user/**/*.c"
          - pattern: "user/**/*.s"
        include_dirs:
          - include
          - user/include
        flags:
          warnings: [all]
          optimization: O2
          debug: false
          defines:
            - USER
        standard: c11
        output_dir: build/user/
        output_pattern: "*.o"
        timeout_secs: 60

    # Phase 3: compile bootloader assembly
    - name: bootloader_compile
      semantic:
        type: compile
        compiler: gcc
        sources:
          - pattern: "bootloader/**/*.s"
        include_dirs:
          - include
        flags:
          warnings: []
          debug: false
        output_dir: build/
        output_pattern: "*.o"
        timeout_secs: 30

    # Phase 4: archive user programs into a static library
    - name: user_archive
      semantic:
        type: archive
        input_artifacts:
          - build/user/shell.o
          - build/user/cat.o
          - build/user/echo.o
          - build/user/ls.o
          - build/user/mkdir.o
        output_file: build/user.a
        library_type: static
        dependencies: [user_compile]
        timeout_secs: 30

    # Phase 5: link the kernel image
    - name: link_kernel
      semantic:
        type: link
        linker: ld
        input_artifacts:
          - build/bootloader.o
          - build/kernel.o
          - build/memory.o
          - build/process.o
          - build/trap.o
          - build/syscall.o
          - build/user.a
        output_file: build/kernel.elf
        output_format: elf64
        linker_script: kernel/link.ld
        libraries:
          - name: c
            hint: "-lc"
        library_dirs:
          - /opt/riscv/lib
        flags:
          extra: "-nostdlib -N -Wl,--print-memory-usage"
        dependencies: [kernel_compile, user_archive, bootloader_compile]
        timeout_secs: 60

    # Phase 6: generate a binary image
    - name: generate_image
      semantic:
        type: custom
        description: "使用 objcopy 从 ELF 生成二进制镜像"
        command: "riscv64-unknown-elf-objcopy -O binary build/kernel.elf build/kernel.bin"
        expected_outputs: [build/kernel.bin]
        dependencies: [link_kernel]
        timeout_secs: 30

    # Phase 7: generate a disassembly artifact
    - name: generate_asm
      semantic:
        type: custom
        description: "生成内核反汇编供调试"
        command: "riscv64-unknown-elf-objdump -D build/kernel.elf > build/kernel.asm"
        expected_outputs: [build/kernel.asm]
        dependencies: [link_kernel]
        timeout_secs: 30
        parallel: true
