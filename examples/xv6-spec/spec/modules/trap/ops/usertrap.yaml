id: trap.usertrap
module: trap
operation: usertrap
stage: trap
purpose: >
  Handle a trap that occurred while in usermode: save user
  context to trapframe, dispatch based on scause (timer,
  syscall, or exception), then return via usertrapret.

related_slice: slice-03-trap
related_adr: null
depends_on:
  requires_modules:
    - trap
    - process
  requires_ops:
    - trap_init
    - devintr
    - syscall

rely:
  state_assumptions:
    - current process has a valid trapframe
    - trap originated from U-mode
  callable_interfaces:
    - devintr, syscall, exit
  resource_assumptions:
    - trapframe page is mapped
  lock_assumptions:
    - no locks held on entry

guarantee:
  returns:
    - void (always calls usertrapret)
  state_updates: []
  side_effects:
    - user registers saved to trapframe
    - sepc, scause, stval saved
    - sstatus.SPP restored
    - on timer: yield()
    - on syscall: sepc += 4, syscall()
  emitted_events:
    - none

preconditions:
  - entered from usermode via trampoline
postconditions:
  - process is resumable via usertrapret
invariants_preserved:
  - kernel never runs with user page table
failure_semantics:
  - unexpected scause in usermode kills process (exit(-1))

concurrency:
  atomicity: single trap handler instance per hart
  lock_order: []
  interrupt_state: interrupts initially disabled
  wait_wakeup_rules: []

security:
  authority_check: scause, sepc from hardware
  isolation_boundary: switch to kernel page table on entry
  user_pointer_policy: registers not used as pointers
    until validated

observability:
  traces: []
  counters:
    - trap count
  expected_logs: []

test_obligations:
  public:
    - usertrap_timer
    - usertrap_syscall_dispatched
  generated:
    - usertrap_illegal_instruction
  hidden_tags:
    - usertrap_nesting

llm_codegen:
  editable_region:
    file: demo/src/lib.rs
    start_marker: "// VOS-EDIT-START:trap.usertrap"
    end_marker: "// VOS-EDIT-END:trap.usertrap"
    create_if_missing: false
  forbidden_changes:
    - do not modify code outside the marked region
    - do not create helper files
    - do not modify build scripts
  required_followup_checks:
    - cargo build --manifest-path demo/Cargo.toml
