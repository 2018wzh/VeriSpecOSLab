id: trap.trap_init
module: trap
operation: trap_init
stage: trap
purpose: >
  Initialize the trap handling subsystem: set the kernel
  trap vector (kernelvec) in stvec.

related_slice: slice-03-trap
related_adr: null
depends_on:
  requires_modules:
    - trap
  requires_ops: []

rely:
  state_assumptions:
    - kernel is running in S-mode
  callable_interfaces:
    - kernelvec (assembly symbol)
  resource_assumptions:
    - none
  lock_assumptions:
    - none

guarantee:
  returns:
    - void
  state_updates: []
  side_effects:
    - stvec set to kernelvec address
    - kernelvec installed as trap handler
  emitted_events:
    - none

preconditions:
  - called once during kernel init
postconditions:
  - stvec != 0
invariants_preserved:
  - stvec updated atomically (csrw)
failure_semantics:
  - panics if kernelvec is NULL

concurrency:
  atomicity: single csrw instruction
  lock_order: []
  interrupt_state: interrupts disabled
  wait_wakeup_rules: []

security:
  authority_check: none
  isolation_boundary: none
  user_pointer_policy: none

observability:
  traces: []
  counters: []
  expected_logs: []

test_obligations:
  public:
    - trap_init_stvec_set
  generated:
    - trap_init_idempotent
  hidden_tags: []

llm_codegen:
  editable_region:
    file: kernel/trap.c
    start_marker: "// VOS-EDIT-START:trap.trap_init"
    end_marker: "// VOS-EDIT-END:trap.trap_init"
    create_if_missing: true
  forbidden_changes:
    - do not modify code outside the marked region
    - do not create helper files
    - do not modify build scripts
  required_followup_checks:
    - make build
