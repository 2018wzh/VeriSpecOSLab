id: kernel/memory.kvmmap

module: kernel/memory

operation: kvmmap
stage: memory
purpose: >
  Install a single page table entry mapping a virtual
  address range to a physical address range with given
  permissions. Used during kernel page table construction.

related_slice: slice-02-memory
related_adr: null
depends_on:
  requires_modules:
    - kernel/memory

  requires_ops:
    - kernel/memory.walk


rely:
  state_assumptions:
    - target pagetable is valid (allocated)
  callable_interfaces:
    - walk (to locate PTE slot)
  resource_assumptions:
    - physical pages for intermediate PT levels are allocated
  lock_assumptions:
    - none

guarantee:
  returns:
    - void
  state_updates: []
  side_effects:
    - PTE(s) installed in target pagetable
    - intermediate page table pages allocated if needed
  emitted_events:
    - none

preconditions:
  - va and pa are page-aligned
  - size is a multiple of PGSIZE
postconditions:
  - va..va+size maps to pa..pa+size with given perm
invariants_preserved:
  - no PTE is overwritten without explicit intent
failure_semantics:
  - panics if kalloc fails for intermediate PT page

concurrency:
  atomicity: single-threaded
  lock_order: []
  interrupt_state: irrelevant
  wait_wakeup_rules: []

security:
  authority_check: none
  isolation_boundary: PTE flags set to perm argument
  user_pointer_policy: none

observability:
  traces: []
  counters: []
  expected_logs: []

test_obligations:
  public:
    - kvmmap_single_page
    - kvmmap_multi_page
  generated:
    - kvmmap_perm_boundary
  hidden_tags: []

llm_codegen:
  editable_region:
    file: kernel/memory.c
    start_marker: "// VOS-EDIT-START:kernel/memory.kvmmap"
    end_marker: "// VOS-EDIT-END:kernel/memory.kvmmap"
    create_if_missing: true
  forbidden_changes:
    - do not modify code outside the marked region
    - do not create helper files
    - do not modify build scripts
  required_followup_checks:
    - make build
