id: process.allocproc
module: process
operation: allocproc
stage: process
purpose: >
  Allocate a free process slot from the process table.
  Initialize its kernel stack, trapframe, and set
  state to USED.

related_slice: slice-04-process
related_adr: null
depends_on:
  requires_modules:
    - process
    - memory
  requires_ops:
    - proc_init
    - kalloc

rely:
  state_assumptions:
    - process table initialized
  callable_interfaces:
    - kalloc (for trapframe page)
  resource_assumptions:
    - at least one free slot in proc table
  lock_assumptions:
    - acquires p->lock on found slot

guarantee:
  returns:
    - struct proc * on success
    - NULL if all NPROC slots are in use
  state_updates: []
  side_effects:
    - one proc slot marked USED
    - trapframe allocated and zeroed
    - kernel stack top set
  emitted_events:
    - none

preconditions:
  - called with interrupts enabled
postconditions:
  - returned proc has valid trapframe pointer
invariants_preserved:
  - proc table size unchanged
failure_semantics:
  - returns NULL if no free slot

concurrency:
  atomicity: proc table scan under p->lock
  lock_order:
    - p->lock (per-slot)
  interrupt_state: push_off/pop_off
  wait_wakeup_rules: []

security:
  authority_check: none
  isolation_boundary: trapframe in kernel memory
  user_pointer_policy: none

observability:
  traces: []
  counters: []
  expected_logs: []

test_obligations:
  public:
    - allocproc_success
    - allocproc_exhaustion
  generated: []
  hidden_tags: []

llm_codegen:
  editable_region:
    file: demo/src/lib.rs
    start_marker: "// VOS-EDIT-START:process.allocproc"
    end_marker: "// VOS-EDIT-END:process.allocproc"
    create_if_missing: false
  forbidden_changes:
    - do not modify code outside the marked region
    - do not create helper files
    - do not modify build scripts
  required_followup_checks:
    - cargo build --manifest-path demo/Cargo.toml
