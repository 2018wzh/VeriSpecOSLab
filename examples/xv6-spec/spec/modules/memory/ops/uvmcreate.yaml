id: memory.uvmcreate
module: memory
operation: uvmcreate
stage: memory
purpose: >
  Create an empty user page table (single L2 page directory
  page with zeroed entries).

related_slice: slice-02-memory
related_adr: null
depends_on:
  requires_modules:
    - memory
  requires_ops:
    - kalloc

rely:
  state_assumptions:
    - kalloc is available
  callable_interfaces:
    - kalloc
  resource_assumptions:
    - one free page available
  lock_assumptions:
    - none

guarantee:
  returns:
    - pagetable_t (new user page table) on success
    - 0 on kalloc failure
  state_updates: []
  side_effects:
    - one page allocated, zeroed
  emitted_events:
    - none

preconditions:
  - called from kernel context
postconditions:
  - returned page table has all entries zero
invariants_preserved:
  - no kernel mappings in user page table
failure_semantics:
  - returns 0 if kalloc fails

concurrency:
  atomicity: single allocation
  lock_order: []
  interrupt_state: irrelevant
  wait_wakeup_rules: []

security:
  authority_check: none
  isolation_boundary: user pagetable isolated from kernel
  user_pointer_policy: none

observability:
  traces: []
  counters: []
  expected_logs: []

test_obligations:
  public:
    - uvmcreate_not_null
  generated:
    - uvmcreate_zeroed
  hidden_tags: []

llm_codegen:
  editable_region:
    file: kernel/memory.c
    start_marker: "// VOS-EDIT-START:memory.uvmcreate"
    end_marker: "// VOS-EDIT-END:memory.uvmcreate"
    create_if_missing: true
  forbidden_changes:
    - do not modify code outside the marked region
    - do not create helper files
    - do not modify build scripts
  required_followup_checks:
    - make build
