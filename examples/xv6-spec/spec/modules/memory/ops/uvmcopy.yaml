id: memory.uvmcopy
module: memory
operation: uvmcopy
stage: memory
purpose: >
  Copy a user page table and all its mapped pages.
  Used by fork to create a child address space.

related_slice: slice-02-memory
related_adr: null
depends_on:
  requires_modules:
    - memory
  requires_ops:
    - kalloc
    - walk
    - uvmunmap

rely:
  state_assumptions:
    - old pagetable is a valid user page table
  callable_interfaces:
    - kalloc, walk, memmove
  resource_assumptions:
    - enough free pages to copy all mappings
  lock_assumptions:
    - none

guarantee:
  returns:
    - pagetable_t on success (complete copy)
    - 0 on failure (partial mappings unmapped)
  state_updates: []
  side_effects:
    - all old pages are duplicated
    - PTE_W is cleared in both old and new PTEs
  emitted_events:
    - none

preconditions:
  - old is a valid pagetable
  - size specifies the range [0, size) to copy
postconditions:
  - child has identical but independent memory
invariants_preserved:
  - no page is shared between parent and child
failure_semantics:
  - on kalloc failure, frees partial copy and returns 0

concurrency:
  atomicity: not atomic (may be rescheduled during copy)
  lock_order: []
  interrupt_state: interrupts enabled during copy
  wait_wakeup_rules: []

security:
  authority_check: none
  isolation_boundary: parent and child isolated
  user_pointer_policy: all user pages correctly duplicated

observability:
  traces: []
  counters: []
  expected_logs: []

test_obligations:
  public:
    - uvmcopy_identity
    - uvmcopy_independence
  generated:
    - uvmcopy_out_of_memory
  hidden_tags: []

llm_codegen:
  editable_region:
    file: demo/src/lib.rs
    start_marker: "// VOS-EDIT-START:memory.uvmcopy"
    end_marker: "// VOS-EDIT-END:memory.uvmcopy"
    create_if_missing: false
  forbidden_changes:
    - do not modify code outside the marked region
    - do not create helper files
    - do not modify build scripts
  required_followup_checks:
    - cargo build --manifest-path demo/Cargo.toml
