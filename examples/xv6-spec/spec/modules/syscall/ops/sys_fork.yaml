id: syscall.sys_fork
module: syscall
operation: sys_fork
stage: syscall
purpose: >
  Syscall wrapper for fork. Calls fork() directly
  and returns its result.

related_slice: slice-05-syscall
related_adr: null
depends_on:
  requires_modules:
    - syscall
    - process
  requires_ops:
    - syscall
    - fork

rely:
  state_assumptions:
    - current process is valid
  callable_interfaces:
    - fork
  resource_assumptions:
    - free proc slot and memory
  lock_assumptions:
    - none

guarantee:
  returns:
    - child PID to parent
    - 0 to child
    - -1 on failure
  state_updates: []
  side_effects:
    - new child process created
  emitted_events:
    - none

preconditions:
  - called from usermode
postconditions:
  - returns appropriate value to caller
invariants_preserved:
  - process table invariants
failure_semantics:
  - returns -1 on resource exhaustion

concurrency:
  atomicity: fork holds its own locks
  lock_order: []
  interrupt_state: irrelevant
  wait_wakeup_rules: []

security:
  authority_check: none
  isolation_boundary: child inherits parent isolation
  user_pointer_policy: inherited

observability:
  traces: []
  counters: []
  expected_logs: []

test_obligations:
  public:
    - sys_fork_parent_pid
    - sys_fork_child_zero
  generated:
    - sys_fork_failure
  hidden_tags: []

llm_codegen:
  editable_region:
    file: demo/src/lib.rs
    start_marker: "// VOS-EDIT-START:syscall.sys_fork"
    end_marker: "// VOS-EDIT-END:syscall.sys_fork"
    create_if_missing: false
  forbidden_changes:
    - do not modify code outside the marked region
    - do not create helper files
    - do not modify build scripts
  required_followup_checks:
    - cargo build --manifest-path demo/Cargo.toml
