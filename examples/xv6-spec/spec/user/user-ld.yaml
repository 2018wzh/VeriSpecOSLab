id: user.user-ld
kind: linker_script
target: user/user.ld
stage: process
purpose: >
  Linker script for xv6 user programs. Places the user
  binary at virtual address 0 (the base of user address
  space), with a simple text/data/bss layout. The kernel
  loads the binary starting at this address.

entry_symbol: _start
base_address: 0x0

sections:
  - name: .text
    vma: 0x0
    lma: 0x0
    flags: "RX"
    alignment: 4096
    inputs:
      - "*(.text .text.*)"
    comment: User program code

  - name: .rodata
    vma: "ALIGN(16)"
    lma: "same"
    flags: "R"
    inputs:
      - "*(.rodata .rodata.*)"
    comment: User program read-only data

  - name: .data
    vma: "ALIGN(16)"
    lma: "same"
    flags: "RW"
    inputs:
      - "*(.data .data.*)"
    comment: User program initialized data

  - name: .bss
    vma: "ALIGN(16)"
    lma: "same"
    flags: "RW"
    inputs:
      - "*(.bss .bss.*)"
      - "*(COMMON)"
    comment: User program BSS

exports:
  - name: _end
    value: "."
    comment: End of user binary (used to calculate size)
discarded:
  - "*(.eh_frame)"
  - "*(.note .note.*)"
