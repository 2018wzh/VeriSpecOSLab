name: vos-portal

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: vos_portal
      POSTGRES_USER: vos
      POSTGRES_PASSWORD: vos
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vos -d vos_portal"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - vos_postgres_data:/var/lib/postgresql/data

  vos-portal:
    image: rust:1-bookworm
    working_dir: /workspace/vos
    command: >
      bash -lc "cargo run -p vos-portal --features postgres"
    environment:
      DATABASE_URL: postgres://vos:vos@postgres:5432/vos_portal
      VOS_PORTAL_HOST: 0.0.0.0
      VOS_PORTAL_PORT: 8080
      VOS_PORTAL_DEMO: "1"
      VOS_PORTAL_INTERNAL_TOKEN: dev-internal-token
      VOS_PORTAL_SPEC_ROOT: /workspace/examples/xv6-spec/spec
      RUST_LOG: vos_portal=info,tower_http=info
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/workspace
      - vos_cargo_registry:/usr/local/cargo/registry
      - vos_cargo_git:/usr/local/cargo/git
      - vos_target:/workspace/vos/target

  vos-web:
    image: node:20-bookworm-slim
    working_dir: /workspace/vos/apps/vos-web
    command: >
      bash -lc "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      VOS_PORTAL_API_ORIGIN: http://vos-portal:8080
    ports:
      - "5173:5173"
    depends_on:
      - vos-portal
    volumes:
      - .:/workspace
      - vos_web_node_modules:/workspace/vos/apps/vos-web/node_modules

  gitea:
    image: gitea/gitea:1.22
    profiles: ["integrations"]
    environment:
      USER_UID: 1000
      USER_GID: 1000
      GITEA__server__ROOT_URL: http://localhost:3001/
      GITEA__database__DB_TYPE: sqlite3
    ports:
      - "3001:3000"
      - "2222:22"
    volumes:
      - vos_gitea_data:/data

  gitea-runner:
    image: gitea/act_runner:0.2.11
    profiles: ["integrations"]
    environment:
      GITEA_INSTANCE_URL: http://gitea:3000
      GITEA_RUNNER_REGISTRATION_TOKEN: ${GITEA_RUNNER_REGISTRATION_TOKEN:-}
      GITEA_RUNNER_NAME: vos-portal-runner
    depends_on:
      - gitea
    volumes:
      - vos_gitea_runner_data:/data
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  vos_postgres_data:
  vos_cargo_registry:
  vos_cargo_git:
  vos_target:
  vos_web_node_modules:
  vos_gitea_data:
  vos_gitea_runner_data:
