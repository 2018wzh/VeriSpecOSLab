name: stable-release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

env:
  BUN_VERSION: 1.3.0

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install workspace dependencies
        working-directory: vos
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Typecheck workspace
        run: bun run typecheck

      - name: Test workspace
        run: bun run test

      - name: Validate package metadata
        run: node scripts/tests/release-package.test.mjs

      - name: Validate npm package contents
        run: npm pack --dry-run

      - name: Validate vos-bin package contents
        run: npm pack --dry-run
        working-directory: vos/packages/vos-bin

  build:
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset: vos-linux-x64
            bun_target: bun-linux-x64
          - os: windows-latest
            asset: vos-windows-x64.exe
            bun_target: bun-windows-x64
          - os: macos-15
            asset: vos-macos-arm64
            bun_target: bun-darwin-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install workspace dependencies
        working-directory: vos
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Resolve build version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="${GITHUB_SHA:0:12}"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Build standalone binary
        env:
          VOS_BUILD_OUTFILE: release/${{ matrix.asset }}
          VOS_BUILD_TARGET: ${{ matrix.bun_target }}
          VOS_COMMAND_VERSION: ${{ steps.version.outputs.version }}
        run: bun run build

      - name: Smoke test release asset
        shell: bash
        run: |
          chmod +x "release/${{ matrix.asset }}" || true
          "./release/${{ matrix.asset }}" --version
          "./release/${{ matrix.asset }}" --help >/dev/null

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: release/${{ matrix.asset }}

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-download

      - name: Prepare release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          find release-download -type f -name 'vos-*' -exec cp '{}' release/ \;
          test "$(find release -maxdepth 1 -type f -name 'vos-*' | wc -l)" -eq 3
          cd release
          sha256sum vos-* > SHA256SUMS

      - name: Validate tag and package versions
        env:
          RELEASE_VERSION: ${{ github.ref_name }}
        run: node scripts/tests/release-package.test.mjs "$RELEASE_VERSION"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: vos ${{ github.ref_name }}
          prerelease: false
          files: release/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Configure npm publishing
        run: npm config set //registry.npmjs.org/:_authToken "$NODE_AUTH_TOKEN"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish vos-bin
        working-directory: vos/packages/vos-bin
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish vos
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
